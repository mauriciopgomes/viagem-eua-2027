<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Debug Safe Area</title>
<style>
:root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #111; color: #fff; font-size: 14px; }
.box {
    padding: 20px;
    margin: 10px;
    border-radius: 8px;
    background: #222;
}
.red-zone {
    background: rgba(255,0,0,0.3);
    height: var(--safe-top);
    width: 100%;
    position: relative;
}
.red-zone::after {
    content: 'SAFE-TOP ZONE';
    position: absolute;
    bottom: 2px;
    left: 10px;
    font-size: 10px;
    color: red;
}
.hero-test {
    height: calc(300px + var(--safe-top));
    background: linear-gradient(to bottom, #0066ff, #003399);
    position: relative;
    overflow: hidden;
}
.hero-test::after {
    content: 'HERO (300px + safe-top)';
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
}
#info { white-space: pre-wrap; line-height: 1.8; }
</style>
</head>
<body>
<div class="red-zone"></div>
<div class="hero-test"></div>
<div class="box" id="info">Loading...</div>
<script>
var st = getComputedStyle(document.documentElement);
var safeTop = st.getPropertyValue('--safe-top').trim();
var safeTopPx = parseFloat(getComputedStyle(document.querySelector('.red-zone')).height);
var heroH = parseFloat(getComputedStyle(document.querySelector('.hero-test')).height);
var bodyPT = getComputedStyle(document.body).paddingTop;
var vw = window.innerWidth;
var vh = window.innerHeight;
var dpr = window.devicePixelRatio;
var standalone = window.navigator.standalone;
var displayMode = window.matchMedia('(display-mode: standalone)').matches;

document.getElementById('info').textContent = [
    'env(safe-area-inset-top): ' + safeTop,
    'Computed safe-top (px): ' + safeTopPx,
    'Hero height (px): ' + heroH,
    'body padding-top: ' + bodyPT,
    'Viewport: ' + vw + 'x' + vh,
    'DPR: ' + dpr,
    'navigator.standalone: ' + standalone,
    'display-mode standalone: ' + displayMode,
    'UA: ' + navigator.userAgent
].join('\n');
</script>
</body>
</html>
