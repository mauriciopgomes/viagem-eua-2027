<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Debug v159</title>
<style>
:root {
    --safe-top: env(safe-area-inset-top, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #050508; color: #f0f0f5; font-size: 14px; }

.hero-test {
    position: relative;
    height: 240px;
    overflow: hidden;
    background: url('https://mauriciopgomes.github.io/viagem-eua-2027/img/dia-01.jpg') center/cover;
}
.hero-test::after {
    content: 'HERO 240px';
    position: absolute; top: 8px; right: 8px;
    background: red; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
}
.hero-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 60px 20px 20px;
    background: linear-gradient(to bottom, transparent 0%, rgba(5,5,8,0.2) 20%, rgba(5,5,8,0.75) 55%, #050508 100%);
}
.hero-title { font-size: 28px; font-weight: 800; }
.hero-sub { font-size: 13px; color: #a6a6ab; margin-top: 6px; }
.badges { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
.badge { background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 5px 12px; font-size: 12px; color: #a6a6ab; }

.stats { display: flex; gap: 6px; padding: 6px 20px; }
.stat { background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 16px; text-align: center; flex: 1; }
.stat b { display: block; font-size: 16px; }
.stat span { font-size: 10px; color: #a6a6ab; }

.search { margin: 8px 20px; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px; color: #a6a6ab; font-size: 14px; }

.info { padding: 20px; font-size: 12px; line-height: 2; color: #a6a6ab; background: rgba(255,255,255,0.04); margin: 12px 20px; border-radius: 12px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="hero-test">
    <div class="hero-overlay">
        <div class="hero-title">🇺🇸 Viagem EUA 2027</div>
        <div class="hero-sub">✈️ 221 dias para o grande dia · 21 Jan 2027</div>
        <div class="badges">
            <span class="badge">🧳 221 dias</span>
            <span class="badge">👨‍👩‍👧 3</span>
            <span class="badge">🚗 ~6.500 km</span>
            <span class="badge">🏞️ 11 Parks</span>
            <span class="badge">⚡ 22 SC</span>
        </div>
    </div>
</div>
<div class="stats">
    <div class="stat"><b>0/413</b><span>CONCLUÍDOS</span></div>
    <div class="stat"><b>0/11</b><span>PARQUES</span></div>
    <div class="stat"><b>0/6.500</b><span>KM</span></div>
</div>
<div class="search">🔍 Buscar lugares, atividades...</div>
<div class="info" id="info">Loading...</div>
<script>
var cs = getComputedStyle(document.querySelector('.hero-test'));
document.getElementById('info').textContent = [
    'Hero computed height: ' + cs.height,
    'SW cache: v159 expected',
    'Viewport: ' + innerWidth + 'x' + innerHeight,
    'DPR: ' + devicePixelRatio,
    'Standalone: ' + (navigator.standalone || matchMedia('(display-mode: standalone)').matches),
    'safe-top: ' + getComputedStyle(document.documentElement).getPropertyValue('--safe-top'),
].join('\n');
</script>
</body>
</html>
